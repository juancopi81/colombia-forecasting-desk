metasources:
  - id: eltiempo_colombia
    name: El Tiempo — Colombia
    url: https://www.eltiempo.com/rss/colombia.xml
    type: news
    country_relevance: high
    access_status: rss_public
    fetch_method: rss
    priority: high
    update_frequency: daily
    trust_role: media_signal
    parsing_difficulty: easy
    enabled: true
    max_items: 15
    notes: "High-volume national news source. Filter aggressively."

  - id: banrep_rss
    name: Banco de la República — RSS
    url: https://www.banrep.gov.co/es/noticias-rss
    type: official_updates
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: daily
    trust_role: official_signal
    parsing_difficulty: medium
    enabled: true
    notes: "BanRep labels this RSS, but the live endpoint behaves like an HTML listing; parse as dated HTML. M1.1 silently received Radware bot-block pages with the simple UA — fixed in M1.2 by browser-like default headers + a bot-block detector. Future-dated blog posts on this page get filtered by the age window."

  - id: banrep_junta_comunicados
    name: Banco de la República — Comunicados Junta Directiva
    url: https://www.banrep.gov.co/es/comunicados-junta
    type: official_updates
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: event_driven
    trust_role: resolution_source
    parsing_difficulty: medium
    enabled: true
    notes: "Primary source for monetary policy decisions. With browser-like headers (M1.2) the page serves dated minutas + Junta Directiva announcements; without them BanRep returns a 1.3KB Radware block page."

  - id: dane_rss
    name: DANE — RSS Noticias
    url: http://www.dane.gov.co/index.php?option=com_rss&feed=RSS1.0&no_html=1
    type: official_updates
    country_relevance: high
    access_status: rss_public
    fetch_method: rss
    priority: high
    update_frequency: daily
    trust_role: official_signal
    parsing_difficulty: easy
    enabled: false
    onboarding_status: blocked
    notes: "Official DANE subscription page still documents this RSS URL, but the live endpoint returns 404 as of 2026-04-28. Use dane_comunicados_prensa until a working feed is found."

  - id: dane_comunicados_prensa
    name: DANE — Comunicados de prensa y presentaciones
    url: https://www.dane.gov.co/index.php/sala-de-prensa/caja-de-herramientas/comunicados-de-prensa-y-presentaciones
    type: official_updates
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: official_signal
    parsing_difficulty: medium
    enabled: true
    max_items: 15
    notes: "Dated table of DANE press releases and PDF downloads."

  - id: camara_agenda_consolidada
    name: Cámara de Representantes — Agenda Consolidada
    url: https://www.camara.gov.co/agenda-consolidada/
    type: calendar
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: daily
    trust_role: agenda_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "Useful for legislative agenda and reform tracking. The /agenda-consolidada/ URL is a navigation hub (links to Excel/PDF agendas on sub-pages) with no inline dates. Needs a sub-URL strategy or a different agenda endpoint."

  - id: senado_agenda_legislativa
    name: Senado — Agenda Legislativa Actual
    url: https://www.senado.gov.co/index.php/documentos/senado-prensa/agenda-legislativa-actual
    type: calendar
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: weekly
    trust_role: agenda_signal
    parsing_difficulty: hard
    enabled: true
    notes: "Often PDF-based; useful but may be harder to parse."

  - id: registraduria_noticias
    name: Registraduría — Noticias
    url: https://www.registraduria.gov.co/-Noticias-.html
    type: official_updates
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: event_driven
    trust_role: official_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "High value during election cycles. URL is gated by a Cloudflare interactive challenge (returns 403 + 'Just a moment...' page). Browser-like headers don't help; needs a real browser or a JS-bypass strategy."

  - id: funcion_publica_rss
    name: Función Pública — Noticias RSS
    url: https://www.funcionpublica.gov.co/noticias-rss/-/asset_publisher/TyvhU7GmBc0f/rss
    type: official_updates
    country_relevance: high
    access_status: rss_public
    fetch_method: rss
    priority: high
    update_frequency: daily
    trust_role: official_signal
    parsing_difficulty: easy
    enabled: true
    max_items: 15
    verify_ssl: false
    notes: "Atom/RSS endpoint advertised by the noticias-rss page. Useful for decrees, public employment, public administration, government staffing, and civic-awareness signals. TLS verification disabled because the live certificate chain fails in this runtime."

  - id: corte_constitucional_comunicados
    name: Corte Constitucional — Comunicados
    url: https://www.corteconstitucional.gov.co/comunicados/
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: event_driven
    trust_role: resolution_source
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "High-impact constitutional rulings. M1.4 investigation: /comunicados/ returns a 1.6KB search-only fragment, and the supposed alternative /relatoria/comunicados.aspx is the same Angular SPA shell (~8KB, <app-root>) with no static data. Both URLs require a headless renderer; postpone until we have one."

  - id: presidencia_noticias
    name: Presidencia — Noticias
    url: https://www.presidencia.gov.co/prensa/noticias
    type: official_updates
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: daily
    trust_role: official_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "Executive branch announcements. Read as official signal, not neutral analysis. Currently returns 0 raw items via generic anchor extractor."

  - id: centro_nacional_consultoria
    name: Centro Nacional de Consultoría
    url: https://www.cnc.com.co/
    type: polling
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: event_driven
    trust_role: polling_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "Polling signal. Extract methodology carefully when available. Currently returns 0 raw items via generic anchor extractor."

  - id: portafolio_rss
    name: Portafolio — Economía RSS
    url: https://www.portafolio.co/rss/economia.xml
    type: news
    country_relevance: high
    access_status: rss_public
    fetch_method: rss
    priority: medium
    update_frequency: daily
    trust_role: media_signal
    parsing_difficulty: easy
    enabled: true
    max_items: 10
    notes: "Business/economy media signal from Portafolio's economy RSS section."

  - id: secop_ii_procesos
    name: datos.gov.co — SECOP II Procesos de Contratación
    url: https://www.datos.gov.co/resource/p6dx-8zbt.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: daily
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: true
    max_items: 30
    notes: "Public procurement signal — newly published procurement procedures (RFPs, tenders). M1.5 enabled via Socrata adapter (date=fecha_de_publicacion_del). URLs synthesized as ?id=<id_del_proceso> since the dataset's urlproceso field often points at a generic SECOP login. Refresh cadence note: the datos.gov.co mirror typically lags ~1–3 weeks behind the live SECOP platform, so on quiet days source-health may show no_raw — that is the dataset, not our parser."

  - id: secop_ii_contratos
    name: datos.gov.co — SECOP II Contratos Electrónicos
    url: https://www.datos.gov.co/resource/jbjy-vk9h.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: daily
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: true
    max_items: 30
    notes: "Signed/awarded contracts on SECOP II — major financial commitments by public entities. M1.5 added via Socrata adapter (date=fecha_de_firma). This is the freshest SECOP view in the M1.5 sweep — sandbox saw fecha_de_firma values within hours of fetch."

  - id: secop_i_procesos
    name: datos.gov.co — SECOP I Procesos de Compra Pública
    url: https://www.datos.gov.co/resource/f789-7hwg.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: daily
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: true
    max_items: 30
    notes: "Legacy SECOP I procurement procedures — many territorial entities still publish here. M1.5 added via Socrata adapter (date=fecha_de_cargue_en_el_secop). Sandbox: 30 raw → 30 cleaned with cargue dates within 2 days of fetch."

  - id: secop_ii_adiciones
    name: datos.gov.co — SECOP II Adiciones de Contrato
    url: https://www.datos.gov.co/resource/cb9c-h8sn.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: weekly
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: true
    max_items: 30
    notes: "Contract amendments/extensions on SECOP II — cost overruns and term extensions are a meaningful political/civic signal. M1.5 added via Socrata adapter (date=fecharegistro). Same 1–3 week ETL lag as secop_ii_procesos; expect intermittent no_raw days."

  - id: secop_multas_sanciones
    name: datos.gov.co — Multas y Sanciones SECOP I
    url: https://www.datos.gov.co/resource/4n4q-k399.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: weekly
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: false
    onboarding_status: disabled_future
    max_items: 30
    notes: "Resolutions imposing fines/sanctions on contractors — would be high-signal for accountability/forecasting. M1.5 wired the Socrata adapter and confirmed the parser works, but the dataset's most-recent fecha_de_publicacion is ~3 months stale (no entries inside any reasonable freshness window during M1.5 sandbox). Disabled to keep source-health clean; flip to enabled once datos.gov.co resumes publishing."

  - id: proyectos_ley_datos_gov
    name: datos.gov.co — Vista Proyectos de Ley
    url: https://www.datos.gov.co/resource/xs56-s7w6.json
    type: dataset
    country_relevance: high
    access_status: api_public
    fetch_method: api
    priority: medium
    update_frequency: weekly
    trust_role: agenda_signal
    parsing_difficulty: medium
    enabled: false
    onboarding_status: disabled_future
    notes: "Legislative project metadata. Skipped in M1.5: this Socrata view's column names are misaligned with their values (the 'senado' column contains bill text, 'legislatura' contains a URL, etc.) — the dataset is unusable as-is. Revisit if Congreso publishes a clean replacement, or substitute with Gacetas del Congreso parsing."

  - id: suin_juriscol_normas
    name: SUIN-Juriscol — Normas de Colombia
    url: https://www.suin-juriscol.gov.co/legislacion/normatividad.html
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: event_driven
    trust_role: legal_signal
    parsing_difficulty: hard
    enabled: false
    onboarding_status: disabled_future
    notes: "Official normative source. Valuable but likely needs source-specific parser work. Superseded for general discovery by suin_juriscol entry."

  - id: diario_oficial
    name: Diario Oficial — Imprenta Nacional
    url: https://svrpubindc.imprenta.gov.co/diario/
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: daily
    trust_role: resolution_source
    parsing_difficulty: medium
    enabled: true
    notes: "Final publication of national norms (laws, decrees, administrative acts). M1.4 added a PrimeFaces-table parser that extracts the latest 10 editions per fetch (Número | Tipo | Fecha). The download buttons are JSF postbacks, so per-edition URLs are synthesized as ?edicion=NNN.NNN; rows still dedupe distinctly."

  - id: gacetas_congreso
    name: Gacetas del Congreso — Imprenta Nacional
    url: https://svrpubindc.imprenta.gov.co/gacetas/index.xhtml
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: daily
    trust_role: agenda_signal
    parsing_difficulty: medium
    enabled: true
    notes: "Best source for legislative bills, ponencias, and text changes before final approval. M1.4 added the shared Imprenta Nacional PrimeFaces-table parser; extracts the latest 10 gacetas per fetch (Número | Entidad | Fecha). Per-gaceta URLs are synthesized as ?gaceta=NNN."

  - id: suin_juriscol
    name: SUIN-Juriscol
    url: https://www.suin-juriscol.gov.co/index.html
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: daily
    trust_role: legal_signal
    parsing_difficulty: medium
    enabled: true
    verify_ssl: false
    onboarding_status: needs_parser
    notes: "Legal-discovery layer: laws, decrees, jurisprudence, and novedades normativas. TLS verification disabled because the live certificate chain fails in this runtime. Sandbox: 200 OK but the index page is a portal landing — generic extractor finds 0 dated anchors. Try the novedades or normatividad sub-page in M1.4."

  - id: gestor_normativo_fp
    name: Gestor Normativo — Función Pública
    url: https://www.funcionpublica.gov.co/eva/gestornormativo/normasfp.php
    type: legal
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: medium
    update_frequency: weekly
    trust_role: legal_signal
    parsing_difficulty: medium
    enabled: true
    verify_ssl: false
    onboarding_status: needs_parser
    notes: "Thematic norm/concept browser. M1.4 investigation: the page lists ~107 norms with year embedded in the title (Ley 1474 de 2011 ...), parseable via regex, but the listed norms are mostly 1990s-2010s reference standards rather than fresh additions — using the year as published_at would mean almost everything fails the 14-day age window. Worth more value as a context source than a daily-signal source; revisit when we have an evidence-pack flow that reads context layers on demand."

  - id: dian_proyectos_normas
    name: DIAN — Proyectos de Normas y Agenda Reglamentaria
    url: https://www.dian.gov.co/normatividad/Paginas/Inicio.aspx
    type: regulatory
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: regulatory_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "Early signal for tax, customs, and exchange-control changes. M1.4 investigation: the SharePoint landing exposes a single sub-link to /Paginas/ProyectosNormas.aspx, but that sub-page itself is also dynamic (51 anchors, 0 dated items, no static project list). Both pages require a headless browser or a different DIAN endpoint (e.g., the agenda-reglamentaria RSS if one exists)."

  - id: minhacienda_proyectos_decreto
    name: MinHacienda — Proyectos de Decreto
    url: https://www.minhacienda.gov.co/normativa/proyectos-de-decretos/2026
    type: regulatory
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: regulatory_signal
    parsing_difficulty: hard
    enabled: true
    onboarding_status: needs_parser
    notes: "Publishes draft decrees with comment windows. High value for debt, budget, pensions, and financial-market questions before the decree is signed. Sandbox: 302 redirect to validate.perfdrive.com (Radware bot manager) then back to a 200 challenge page — bot detector did not catch it because the final response was 200. Needs both a stronger bot-block heuristic and a real-browser fetch path."

  - id: cne_encuestas_2026
    name: CNE — Encuestas Electorales 2026
    url: https://www.cne.gov.co/encuestas-2026
    type: polling
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: polling_signal
    parsing_difficulty: medium
    enabled: true
    verify_ssl: false
    notes: "Official CNE source for electoral poll filings/fichas. TLS verification disabled because the live certificate chain fails in this runtime. Sandbox: extracts dated poll filings (ANALIZAR Y LOMBANA, ATLAS INTEL, etc.); current 0-rankable is just freshness — fresh fichas will pass the 14-day age filter when they land."

  - id: registraduria_calendario_presidencial_2026
    name: Registraduría — Calendario Electoral Presidencial 2026
    url: https://wapp.registraduria.gov.co/electoral/2026/presidente-de-la-republica/fechas-importantes.html
    type: calendar
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: event_driven
    trust_role: resolution_source
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "Canonical election-calendar page for the 2026 president/vice-president election. M1.4 investigation: the page has no <table> elements — the calendar lives in a JS-rendered <div id='timelineContainer'> that is empty in the static HTML. The only static item is a single PDF link (Resolución 2580, dated 2025-03-05, already past). Needs a headless browser to extract the actual calendar dates, or a fetch of the underlying JSON if the timeline JS exposes one."

  - id: moe_observatorio_politico_electoral
    name: MOE — Observatorio Político Electoral de la Democracia
    url: https://moe.org.co/politico-electoral-de-la-democracia/
    type: civic
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: civic_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    notes: "High-value civic/electoral risk source. Sandbox: 200 OK but generic anchor extractor returns 0 items — page is a navigation hub linking to sub-platforms (mapas y factores de riesgo, violencia política, reformas, etc.). Needs a sub-URL strategy or a different MOE entry point (e.g., the publications/news endpoint)."

  - id: mincit_zonas_francas
    name: MinCIT — Zonas Francas (Estadísticas)
    url: https://zf.mincit.gov.co/estadisticas
    type: regulatory
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: weekly
    trust_role: regulatory_signal
    parsing_difficulty: medium
    enabled: true
    notes: "Official MinCIT zonas francas statistics page. Sandbox: extracts the three core PDFs (Zonas Francas aprobadas, Usuarios calificados Vigentes, Plan de internacionalización) with proper Fecha de actualización dates. Source publishes infrequently, so most days the 14-day age filter drops everything; new updates pass through automatically."

  - id: dane_icoced
    name: DANE — Índice de Costos de la Construcción de Edificaciones (ICOCED)
    url: https://www.dane.gov.co/index.php/estadisticas-por-tema/precios-y-costos/indice-de-costos-de-la-construccion-de-edificaciones-icoced/indice-de-costos-de-la-construccion-de-edificaciones-icoced-historicos
    type: economic_indicator
    country_relevance: high
    access_status: html_public
    fetch_method: html
    priority: high
    update_frequency: monthly
    trust_role: official_signal
    parsing_difficulty: medium
    enabled: true
    onboarding_status: needs_parser
    max_items: 1
    notes: "Monthly construction cost index with Excel data annexes. URL pattern: /files/operaciones/ICOCED/anex-ICOCED-{month}{year}.xlsx. Tracks residential/non-residential costs, input-level data (cement, steel, labor). High signal for infrastructure delay/cost overrun forecasts. Latest: March 2026 (0.75% monthly variation)."
